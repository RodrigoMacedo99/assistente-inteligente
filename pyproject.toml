[project]
name = "assistente-inteligente"
version = "0.1.0"
description = "Assistente inteligente com arquitetura limpa"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "python-dotenv>=1.0.0",
    "fastapi>=0.100.0",
    "uvicorn>=0.23.0",
    "pydantic>=2.0.0",
    "requests>=2.31.0"
]

[project.optional-dependencies]
openai = ["openai>=1.0.0"]
anthropic = ["anthropic>=0.18.0"]
gemini = ["google-generativeai>=0.8.0"]
langchain = ["langchain>=0.2.0"]
dev = [
    "pytest",
    "black",
    "ruff",
    "mypy"
]