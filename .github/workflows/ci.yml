name: CI — Testes e Qualidade de Código

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

# Cancela runs anteriores do mesmo branch para economizar recursos da Pi
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Lint e formatação (roda no GitHub-hosted para feedback rápido em PRs)
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: "Lint & Format (ruff + black)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instala ferramentas de lint
        run: pip install ruff black

      - name: Ruff — linter
        run: ruff check aiadapter/ tests/ --output-format=github

      - name: Black — formatação
        run: black --check --diff aiadapter/ tests/

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Testes unitários na Raspberry Pi (self-hosted ARM64)
  # Para configurar o runner na Pi:
  #   1. Vá em Settings → Actions → Runners → New self-hosted runner
  #   2. Escolha Linux / ARM64
  #   3. Execute os comandos na Raspberry Pi
  # ─────────────────────────────────────────────────────────────────────────────
  test-raspberry:
    name: "Testes Unitários (Raspberry Pi ARM64)"
    runs-on: [self-hosted, linux, arm64, raspberry-pi]
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verifica Python
        run: python3 --version

      - name: Cria/ativa virtualenv
        run: |
          python3 -m venv .venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Instala dependências de teste
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Roda testes unitários
        run: |
          pytest tests/unit/ \
            --cov=aiadapter \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v \
            --tb=short \
            -m "not integration"

      - name: Upload relatório de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-raspberry
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Testes unitários no GitHub-hosted (fallback / PRs de forks)
  # Roda em paralelo com a Pi para garantir CI mesmo se a Pi estiver offline
  # ─────────────────────────────────────────────────────────────────────────────
  test-ubuntu:
    name: "Testes Unitários (Ubuntu x86_64)"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instala dependências
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Roda testes unitários
        run: |
          pytest tests/unit/ \
            --cov=aiadapter \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v \
            --tb=short \
            -m "not integration"

      - name: Upload cobertura para Codecov (opcional)
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Testes de integração com Ollama (só na Pi, que tem Ollama instalado)
  # ─────────────────────────────────────────────────────────────────────────────
  test-integration-ollama:
    name: "Integração Ollama (Raspberry Pi)"
    runs-on: [self-hosted, linux, arm64, raspberry-pi]
    needs: test-raspberry
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Garante que venv existe
        run: |
          python3 -m venv .venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Instala dependências
        run: pip install -e ".[dev]"

      - name: Verifica se Ollama está rodando
        id: ollama_check
        run: |
          if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::Ollama não está rodando. Pulando testes de integração."
          fi

      - name: Roda testes de integração
        if: steps.ollama_check.outputs.available == 'true'
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            -m "integration" \
            --no-cov
